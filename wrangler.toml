# Cloudflare Pages — direct upload.
#
# site/ is deliberately kept out of git (see .gitignore), so there is no repo for
# Pages to build from. Deploys are pushed straight from this working copy:
#
#   npx wrangler pages deploy
#
# pages_build_output_dir is what makes that work with no arguments: wrangler
# uploads the folder as-is. There is no build step -- the site is three static
# files and hand-written CSS.
#
# First run will prompt for a browser login and offer to create the project.

name = "hub-moon"
pages_build_output_dir = "site"
compatibility_date = "2026-07-15"
