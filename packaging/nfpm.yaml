# nfpm config — one file, both .deb and .rpm. It wraps the self-contained
# PyInstaller bundle, so there's no per-distro PySide6 dependency to name.
#
#   1. build the bundle first (on Linux):  pyinstaller packaging/hub-moon.spec
#   2. from the repo root:
#        nfpm pkg --packager deb -f packaging/nfpm.yaml   # → hub-moon_0.2.0_amd64.deb
#        nfpm pkg --packager rpm -f packaging/nfpm.yaml   # → hub-moon-0.2.0.x86_64.rpm
#
# nfpm: https://nfpm.goreleaser.com  (a single Go binary, no toolchain)
name: hub-moon
arch: amd64            # nfpm maps this to x86_64 for rpm
platform: linux
version: 0.2.0
release: 1
section: sound
priority: optional
maintainer: MiyukiVigil
description: |
  Parametric EQ control for Moondrop USB DACs — CLI + Qt desktop GUI.
  Reads and writes the DAC's own DSP (PEQ, pre-gain, offset) over USB HID.
vendor: MiyukiVigil
homepage: https://github.com/MiyukiVigil/Hub_Moon
license: MIT

contents:
  # the whole self-contained bundle
  - src: ./dist/hub-moon
    dst: /opt/hub-moon
  # launcher on PATH → the bundled binary
  - src: /opt/hub-moon/hub-moon
    dst: /usr/bin/hub-moon-gui
    type: symlink
  # hidraw access without root
  - src: ./packaging/70-moondrop.rules
    dst: /usr/lib/udev/rules.d/70-moondrop.rules
  - src: ./packaging/hub-moon.desktop
    dst: /usr/share/applications/hub-moon.desktop
  - src: ./packaging/hub-moon.svg
    dst: /usr/share/icons/hicolor/scalable/apps/hub-moon.svg

scripts:
  postinstall: ./packaging/postinstall.sh
