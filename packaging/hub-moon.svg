<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111a29"/>
      <stop offset="1" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#63c7dd"/>
      <stop offset="1" stop-color="#a2e2e8"/>
    </linearGradient>
    <!-- crescent: a disc with an offset disc punched out -->
    <mask id="cres">
      <rect x="0" y="0" width="128" height="128" fill="#000"/>
      <circle cx="90" cy="38" r="20" fill="#fff"/>
      <circle cx="99" cy="32" r="17" fill="#000"/>
    </mask>
  </defs>

  <!-- deep-sea rounded tile -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bg)" stroke="#24304a" stroke-width="2"/>

  <!-- crescent moon, upper area -->
  <rect x="0" y="0" width="128" height="128" fill="#a2e2e8" mask="url(#cres)"/>

  <!-- EQ response curve sweeping across the lower half -->
  <path d="M18 92 C34 92 38 70 52 70 C64 70 66 90 78 90 C90 90 96 60 110 60"
        fill="none" stroke="url(#curve)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="52" cy="70" r="5" fill="#0d1420" stroke="#63c7dd" stroke-width="3"/>
  <circle cx="78" cy="90" r="5" fill="#0d1420" stroke="#63c7dd" stroke-width="3"/>
</svg>
